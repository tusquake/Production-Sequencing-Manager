spring.application.name=order-sequencing-gcp

# Google Cloud SQL PostgreSQL Connection Settings
spring.cloud.gcp.sql.database-name=sequencingdb
spring.cloud.gcp.sql.instance-connection-name=galvanic-axle-474007-a2:us-central1:sequencing-db-instance

# Database credentials (can be overridden via environment variables)
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:YourSecurePassword123}

# Hibernate / JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# HikariCP Pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
