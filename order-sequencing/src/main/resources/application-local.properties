spring.application.name=order-sequencing-local

# Use H2 by default for out-of-the-box local testing
spring.datasource.url=jdbc:h2:mem:sequencingdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# SAP HANA Local Configuration (uncomment to use)
# spring.datasource.url=jdbc:sap://localhost:30015
# spring.datasource.driver-class-name=com.sap.db.jdbc.Driver
# spring.datasource.username=DBADMIN
# spring.datasource.password=Password123
# spring.jpa.hibernate.ddl-auto=none

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=60000
